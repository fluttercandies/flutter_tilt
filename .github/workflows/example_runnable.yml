name: 'example runnable'
run-name: 'Example Runnable'

# Disable permissions for all of the available permissions
permissions: {}

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
      - dev
    paths-ignore:
      - '**.md'

jobs:
  code-analysis:
    name: 'Code Analysis'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./example
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          flutter-version-file: example/pubspec.yaml
      - name: Prepare dependencies (example)
        run: |
          flutter --version
          flutter pub get
      - name: Check Dart code formatting
        run: |
          dart format . -o none --set-exit-if-changed
      - name: Analyze Dart code
        run: |
          flutter analyze . --no-fatal-infos

  test-build:
    needs: [code-analysis]
    strategy:
      matrix:
        include:
          - os: macos-latest
            build: iOS
          - os: macos-latest
            build: macOS
          - os: windows-latest
            build: Android
          - os: windows-latest
            build: Windows
          - os: windows-latest
            build: Web
    name: 'Test Build :: ${{ matrix.os }} :: ${{ matrix.build }}'
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./example
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          flutter-version-file: example/pubspec.yaml
      - name: Prepare dependencies
        run: |
          dart --version
          flutter --version
          flutter pub get
      - name: Build iOS
        if: matrix.build == 'iOS'
        run: flutter build ios --no-codesign
      - name: Build macOS
        if: matrix.build == 'macOS'
        run: flutter build macos --debug
      - name: Build Android
        if: matrix.build == 'Android'
        run: flutter build apk --debug
      - name: Build Windows
        if: matrix.build == 'Windows'
        run: flutter build windows --debug
      - name: Build Web
        if: matrix.build == 'Web'
        run: flutter build web --wasm --release
